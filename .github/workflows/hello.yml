# Workflow (No indentation req for naming the workflow)
# Should have name
name: Hello

# on tells when the workflowwill run (give indentation by tab)
on:
  workflow_dispatch:

# Jobs
# Should be inside the workflow
# Job teslls what the workflow should do, there can be one or more than one jobs, hence we write "jobs"
# Jobs is an object so needs indentation
jobs:
  # 1st job (give indentation)
  say-hello:
    # creates an ephermal comtainer with ubuntu running
    runs-on: ubuntu-latest
    # That ephermal container will have steps to execute, hence name those steps and use run (run has the command)
    steps:
      - name: say hello to everyone
        run: echo "hello everyone"

# Steps
# Should be inside the job

# Actions
# Should be inside the steps
